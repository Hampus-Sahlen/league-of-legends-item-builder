<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League Item Builder</title>
    <link rel="stylesheet" href="style/mainpage.css">
    <script src="script/item_builder.js" defer></script>
</head>

<body>
    <header class="top-nav">
        <h1>Hampus Sahlen</h1>
        <a href="login.html" class="logout-btn">Log out</a>
    </header>

    <main class="builder-container">

        <div id="storage-container" class="panel storage">
            <h2>Item Shop</h2>
            <div class="item-grid">
                <article class="item" draggable="true">
                    <img src="images/Blade_of_the_Ruined_King_item_HD.webp" alt="Blade of the Ruined King">
                </article>
                <article class="item" draggable="true">
                    <img src="images/Infinity_Edge_item_HD.webp" alt="Infinity Edge">
                </article>
            </div>
        </div>

        <div id="inventory-container" class="panel inventory">
            <h2>Your Build</h2>
            <div class="inventory-grid">
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
            </div>
        </div>

        <div id="stats-container" class="panel stats">
            <h2>Total Stats</h2>
            <div class="stats-list">
                <p>Ability Power: <span>95</span></p>
                <p>Magic penetration: <span>40%</span></p>
            </div>
        </div>

    </main>
</body>

</html>
